# Dev overrides: mount source so CSS/HTML/JS changes apply without rebuilding.
# Usage: docker compose up
# Frontend: Vite dev server at http://localhost:4002 (live reload).
# Backend: node --watch restarts on file changes.

services:
  backend:
    environment:
      CORS_ORIGIN: http://localhost:4002
    volumes:
      - ./backend/src:/app/src
    command: node --watch src/index.js

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4002:4000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
